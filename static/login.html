<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCita — Iniciar Sesión</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="navbar-brand" href="landing.html">
    <div class="brand-icon"><i class="bi bi-heart-pulse-fill"></i></div>
    <div>
      Portal HUN
      <span class="brand-sub">Agenda tu cita</span>
    </div>
  </a>
  <div class="navbar-spacer"></div>
  <div class="navbar-actions">
    <a class="btn-nav" href="landing.html">
      <i class="bi bi-house-door"></i> Inicio
    </a>
  </div>
</nav>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════════════════════════════════ -->
<!-- AUTH PAGE (Login / Registro) — DEFAULT VIEW -->
<!-- ═══════════════════════════════════════════ -->
<div class="auth-page" id="authPage">
  <div class="auth-bg-pattern"></div>
  <div class="auth-bg-icons">
    <span><i class="bi bi-heart-pulse"></i></span>
    <span><i class="bi bi-clipboard2-pulse"></i></span>
    <span><i class="bi bi-hospital"></i></span>
    <span><i class="bi bi-capsule"></i></span>
    <span><i class="bi bi-activity"></i></span>
    <span><i class="bi bi-bandaid"></i></span>
  </div>
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="bi bi-heart-pulse-fill"></i></div>
      <h3 id="authTitle">Iniciar Sesión</h3>
      <p id="authSubtitle">Accede a tu panel de citas médicas</p>
    </div>
    <div class="auth-body">
      <div id="authAlert" class="alert d-none"></div>
      <form id="authForm" onsubmit="return handleAuth(event)">
        <div class="mb-3" id="nameGroup" style="display:none">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" id="regName" placeholder="Ej: Juan Pérez García">
        </div>
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="authEmail" placeholder="tu@correo.com" required>
        </div>
        <div class="mb-3" id="docGroup" style="display:none">
          <label class="form-label">Documento de identidad</label>
          <input type="text" class="form-control" id="regDoc" placeholder="CC, TI, CE...">
        </div>
        <div class="mb-3" id="phoneGroup" style="display:none">
          <label class="form-label">Teléfono</label>
          <input type="text" class="form-control" id="regPhone" placeholder="3001234567">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="authPassword" placeholder="••••••••" required>
        </div>
        <div class="mb-4" id="confirmGroup" style="display:none">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="regConfirm" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="authBtn">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <span id="authToggle">¿No tienes cuenta? <a onclick="toggleAuth()">Regístrate gratis</a></span>
      <br><a onclick="showForgotPassword()" style="margin-top:.3rem;display:inline-block">
        <i class="bi bi-key me-1"></i>Olvidé mi contraseña
      </a>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- FORGOT PASSWORD PAGE                       -->
<!-- ═══════════════════════════════════════════ -->
<div class="auth-page" id="forgotPage" style="display:none">
  <div class="auth-bg-pattern"></div>
  <div class="auth-card">
    <div class="auth-header" style="background:linear-gradient(145deg,#7c3aed,#1a6cf6)">
      <div class="auth-icon"><i class="bi bi-shield-lock-fill"></i></div>
      <h3>Recuperar Contraseña</h3>
      <p>Te enviaremos instrucciones por correo</p>
    </div>
    <div class="auth-body">
      <div id="forgotAlert" class="alert d-none"></div>
      <form id="forgotForm" onsubmit="return handleForgotPassword(event)">
        <div class="mb-4">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="forgotEmail" placeholder="tu@correo.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-send"></i> Enviar instrucciones
        </button>
      </form>
      <form id="resetForm" style="display:none" onsubmit="return handleResetPassword(event)">
        <div class="mb-3">
          <label class="form-label">Token de recuperación</label>
          <input type="text" class="form-control" id="resetToken" placeholder="Pega el token aquí" required>
          <div class="form-text"><i class="bi bi-info-circle me-1"></i>Revisa tu correo o la consola del servidor</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" class="form-control" id="resetPassword" placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número, 1 especial" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" class="form-control" id="resetConfirm" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">
          <i class="bi bi-check-lg"></i> Restablecer contraseña
        </button>
      </form>
    </div>
    <div class="auth-footer">
      <a onclick="showLogin()"><i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión</a>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
