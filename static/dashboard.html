<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCita — Panel de Control</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <button class="btn-sidebar-toggle" id="sidebarToggle">
    <i class="bi bi-list"></i>
  </button>
  <a class="navbar-brand" href="landing.html">
    <div class="brand-icon"><i class="bi bi-heart-pulse-fill"></i></div>
    <div>
      Portal HUN
      <span class="brand-sub">Agenda tu cita</span>
    </div>
  </a>
  <div class="navbar-spacer"></div>
  <div id="navUser" style="display:none !important">
    <button class="btn-nav-icon" id="themeToggleBtn" onclick="toggleTheme()" title="Cambiar tema">
      <i class="bi bi-moon"></i>
    </button>
    <div class="btn-nav-icon d-none d-md-flex" style="gap: 0.4rem; padding-left: 0.6rem; padding-right: 0.6rem;">
      <i class="bi bi-person-badge"></i>
      <span id="navRole" style="font-size: 0.85rem; font-weight: 600; text-transform: capitalize;"></span>
    </div>
    <div class="d-none" id="navAvatar">U</div>
    <span class="d-none" id="navName"></span>
    <button class="btn-nav-icon" onclick="logout()" title="Cerrar sesión">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-user">
    <div class="sidebar-avatar" id="sidebarAvatarLg">U</div>
    <div class="sidebar-user-name" id="sidebarUserName">Cargando...</div>
    <div class="sidebar-user-role" id="sidebarUserRole">—</div>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section-label">Navegación</div>
    <div id="sidebarLinks"></div>
  </div>
  <div class="sidebar-footer">
    <i class="bi bi-shield-check text-primary me-1"></i>
    MediCita v1.0 · Seguro
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
  <div id="dashboardPages"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="confirmModalLabel">Confirmar</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="confirmModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-sm btn-primary" id="confirmModalBtn">Aceptar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL REGISTRO MEDICO (Admin) -->
<div class="modal fade" id="modalNuevoMedico" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;">
        <h6 class="modal-title" style="color:#fff;font-weight:700;">
          <i class="bi bi-person-plus me-2"></i>Registrar Nuevo Médico
        </h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalMedicoAlert" class="alert d-none"></div>
        <form id="formNuevoMedico" onsubmit="return registrarNuevoMedico(event)">
          <p class="modal-section-title"><i class="bi bi-person me-1"></i>Datos personales</p>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Nombre completo</label>
              <input type="text" class="form-control" id="nmNombre" placeholder="Dr. Juan Pérez" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" id="nmCorreo" placeholder="medico@hospital.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Documento</label>
              <input type="text" class="form-control" id="nmDocumento" placeholder="CC, RM, CE..." required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Teléfono</label>
              <input type="text" class="form-control" id="nmTelefono" placeholder="3001234567">
            </div>
            <div class="col-md-6">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="nmPassword" placeholder="Mín. 8 car, 1 mayúsc, 1 núm, 1 especial" required>
            </div>
          </div>
          <p class="modal-section-title"><i class="bi bi-hospital me-1"></i>Datos profesionales</p>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Registro profesional</label>
              <input type="text" class="form-control" id="nmRegistro" placeholder="Ej: RM-12345" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Consultorio</label>
              <input type="text" class="form-control" id="nmConsultorio" placeholder="Ej: Consultorio 302-B" required>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btnRegistrarMedico">
              <i class="bi bi-check-lg me-1"></i>Registrar Médico
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
